name: .NET Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read
  checks: write

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './Neasden.Consumer' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '9.0.x' # set this to the dotnet version to use

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build & Publish API
        run: dotnet publish ./Neasden.API/Neasden.API.csproj -c Release -o ./output/API

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API

  build-and-deploy-consumer:
    name: Build Consumer (Windows)
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: Login to Azure for Neasden.Consumer
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9528E2B23CA24F84B5B41D048863316E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CAC05A23993841408CAAC5F020781CA4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_288C97172BAA4B94B244857C164347F9 }}
      
      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'neasden-consumer'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [ build-api ]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Neasden.API artifact
        uses: actions/download-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API
      
      - name: Login to Azure for Neasden.API
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92A358569B66448AB2AD150F5E466513 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B19828EB75B4E66ACEC09358CBCD81A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C7B2C5C43CD74364B399F53962B303E9 }}

      - name: Deploy Neasden.API
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'neasden'
          slot-name: 'Production'
          package: ./output/API

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish Neasden.Saver
        run: dotnet publish ./Neasden.Saver/Neasden.Saver.csproj -c Release -o ./output

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: neasden.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: docker build -f Neasden.Saver/Dockerfile -t neasden.azurecr.io/neasden:latest .

      - name: Push Docker image
        run: docker push neasden.azurecr.io/neasden:latest

      - name: Login to Azure for Neasden Saver
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92A358569B66448AB2AD150F5E466513 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B19828EB75B4E66ACEC09358CBCD81A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C7B2C5C43CD74364B399F53962B303E9 }}
      
      - name: Deploy Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: neasden
          containerAppName: neasden-saver
          acrUsername:  ${{ secrets.ACR_USERNAME }}
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          resourceGroup: Mind-The-Ping
          imageToDeploy: neasden.azurecr.io/neasden:latest