name: .NET Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build & Publish API
        run: dotnet publish ./Neasden.API/Neasden.API.csproj -c Release -o ./output/API

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API

  build-consumer:
    name: Build Consumer (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '9.x'

      - name: Build Consumer
        shell: pwsh
        run: |
          pushd './Neasden.Consumer'
          dotnet publish -c Release -o ./output
          popd

      - name: Upload Consumer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neasden.Consumer
          path: ./Neasden.Consumer/output

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [ build-api, build-consumer ]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Neasden.API artifact
        uses: actions/download-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API

      - name: Download Neasden.Consumer artifact
        uses: actions/download-artifact@v4
        with:
          name: Neasden.Consumer
          path: ./output/Consumer

      - name: Login to Azure for Neasden.API
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_92A358569B66448AB2AD150F5E466513 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B19828EB75B4E66ACEC09358CBCD81A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C7B2C5C43CD74364B399F53962B303E9 }}

      - name: Deploy Neasden.API
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'neasden'
          slot-name: 'Production'
          package: ./output/API

      - name: Login to Azure for Neasden.Consumer
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9528E2B23CA24F84B5B41D048863316E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CAC05A23993841408CAAC5F020781CA4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_288C97172BAA4B94B244857C164347F9 }}

      - name: Deploy Neasden.Consumer
        uses: Azure/functions-action@v1
        with:
          app-name: 'neasden-consumer'
          slot-name: 'Production'
          package: './output/Consumer'
