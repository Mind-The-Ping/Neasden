name: .NET Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  actions: read
  checks: write

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './Neasden.Consumer' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '9.0.x' # set this to the dotnet version to use

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build & Publish API
        run: dotnet publish ./Neasden.API/Neasden.API.csproj -c Release -o ./output/API

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API

  build-and-deploy-consumer:
    name: Build Consumer
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: Login to Azure for Neasden.Consumer
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4D5DBA83129B4BF59B31EE346BC37946 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A085BB59450C4CE5B8A4C218ABCD602C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6D01BCD898124A04862922F0207D53C5 }}
      
      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'neasden-consumer-ping'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [ build-api ]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Neasden.API artifact
        uses: actions/download-artifact@v4
        with:
          name: Neasden.API
          path: ./output/API
      
      - name: Login to Azure for Neasden.API
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_98C263D238894A03975BBFBC7A89A758 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A4EA7EB8BF02451CAECFA3D2C2A538F0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CFB2010E409D4BB9B2C1FACEEE5C4BF2 }}

      - name: Deploy Neasden.API
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'neasden-ping'
          slot-name: 'Production'
          package: ./output/API