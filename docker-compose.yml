services:
  db:
    image: postgres:16
    container_name: neasden-db
    environment:
      POSTGRES_DB: neasden_db
      POSTGRES_USER: neasdenUser
      POSTGRES_PASSWORD: password12345
    ports:
      - "5434:5432"  # host port mapping for local apps
    networks:
      neasden-net:
        aliases:
          - postgres

  redis:
    image: redis:latest
    container_name: neasden-redis
    ports:
      - "6382:6379"  # host port mapping for local apps
    networks:
      neasden-net:
        aliases:
          - redis

  emulator:
    container_name: "servicebus-emulator"
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - "${CONFIG_PATH}:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      ACCEPT_EULA: ${ACCEPT_EULA}
    depends_on:
      - sqledge
    networks:
      sb-emulator:
        aliases:
          - "sb-emulator"

  sqledge:
    container_name: "sqledge"
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    networks:
      sb-emulator:
        aliases:
          - "sqledge"
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"

networks:
  neasden-net:
    driver: bridge
  sb-emulator:
    driver: bridge
